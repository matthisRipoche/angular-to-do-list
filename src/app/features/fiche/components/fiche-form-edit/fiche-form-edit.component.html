<form [formGroup]="ficheFormEdit" (ngSubmit)="onSubmit()">

    <input type="text" formControlName="title" placeholder="Titre de la fiche">

    <input type="date" formControlName="deadline" placeholder="Date de la fiche">

    <select formControlName="status">
        <option value="todo">Todo</option>
        <option value="in-progress">En cours</option>
        <option value="done">Done</option>
    </select>

    <textarea formControlName="description" placeholder="Description de la fiche"></textarea>

    <button type="submit" [disabled]="ficheFormEdit.invalid">Enregistrer</button>
</form>

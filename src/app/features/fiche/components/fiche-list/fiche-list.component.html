<div class="header-actions">
  <button class="btn-create" (click)="toggleModalCreate()">+ Nouvelle Fiche</button>
</div>

<div class="board">
  <section class="column">
    <h2>À Faire</h2>
    <div class="list">
      @for(fiche of fichesToDo(); track fiche.id) {
      <app-fiche [fiche]="fiche"></app-fiche>
      }
    </div>
  </section>

  <section class="column">
    <h2>En Cours</h2>
    <div class="list">
      @for(fiche of fichesInProgress(); track fiche.id) {
      <app-fiche [fiche]="fiche"></app-fiche>
      }
    </div>
  </section>

  <section class="column">
    <h2>Terminé</h2>
    <div class="list">
      @for(fiche of fichesDone(); track fiche.id) {
      <app-fiche [fiche]="fiche"></app-fiche>
      }
    </div>
  </section>
</div>

@if (isModalCreateOpen()) {
<div class="modal-backdrop" (click)="toggleModalCreate()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Créer une fiche</h2>
      <button class="btn-close" (click)="toggleModalCreate()">×</button>
    </div>
    <app-fiche-form-create (afterSubmit)="toggleModalCreate()"></app-fiche-form-create>
  </div>
</div>
}

@if (isModalEditOpen()) {
<div class="modal-backdrop" (click)="closeEditModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Modifier une fiche</h2>
      <button class="btn-close" (click)="closeEditModal()">×</button>
    </div>
    <app-fiche-form-edit [fiche]="ficheToEdit()" (afterSubmit)="closeEditModal()"></app-fiche-form-edit>
  </div>
</div>
}
